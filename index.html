<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mercury Hub - Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
    radial-gradient(circle at top,#123456,#050505 65%);
    color:white;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
    padding:40px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 50px rgba(0,140,255,.2);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:linear-gradient(135deg,#00bfff,#0066ff);
    box-shadow:0 0 35px #008cff;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.08);
    }
}

h1{
    margin-top:25px;
    font-size:32px;
}

h1 span{
    color:#00aaff;
}

p{
    margin-top:15px;
    color:#aaa;
    line-height:1.6;
    font-size:17px;
}

.status{
    margin-top:25px;
    display:flex;
    gap:8px;
    justify-content:center;
    align-items:center;
    padding:12px;
    border-radius:12px;
    color:#ff5555;
    background:rgba(255,0,0,.1);
    border:1px solid rgba(255,0,0,.3);
}

.loader{
    margin:30px auto 15px;
    width:45px;
    height:45px;
    border:4px solid #333;
    border-top:4px solid #00aaff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

small{
    color:#666;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<svg width="45" height="45" viewBox="0 0 24 24" fill="none">
<path d="M13 2L3 14H11L10 22L21 9H13L13 2Z"
stroke="white"
stroke-width="2"
stroke-linejoin="round"/>
</svg>
</div>

<h1>
Mercury <span>Hub</span>
</h1>

<p>
Website sedang mengalami gangguan sementara.
<br>
Kami sedang melakukan perbaikan sistem.
<br>
Silakan tunggu sampai layanan kembali normal.
</p>

<div class="status">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none">
<circle cx="12" cy="12" r="10" stroke="#ff5555" stroke-width="2"/>
<path d="M12 8V12" stroke="#ff5555" stroke-width="2"/>
<circle cx="12" cy="16" r="1" fill="#ff5555"/>
</svg>

System Maintenance
</div>

<div class="loader"></div>

<small>
Mercury Hub © 2026
</small>

</div>

</body>
</html>
